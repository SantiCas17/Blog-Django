{% extends 'blogweb/base.html' %}
{% block title %}Mi Perfil{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">Configuración de Perfil</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-4 fw-bold">Guardar Datos</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
