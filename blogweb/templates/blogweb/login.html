{% extends 'blogweb/base.html' %}
{% block title %}Iniciar Sesión{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">¡Hola! 👋</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3 fw-bold">Ingresar</button>
                </form>
                <div class="text-center mt-4 border-top pt-3">
                    <p class="text-muted mb-0">¿No tenés cuenta? <a href="{% url 'registro' %}" class="text-decoration-none fw-bold">Registrate acá</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
