{% extends 'blogweb/base.html' %}
{% block title %}Registro{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">Crear una Cuenta</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ formulario.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">Registrarse</button>
                </form>
                <div class="text-center mt-4 border-top pt-3">
                    <p class="text-muted mb-0">¿Ya tenés cuenta? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Iniciá sesión acá</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
